<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <title>Foto Kita Blur</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }
      video {
        width: 100vw;
        height: 100dvh;
        object-fit: cover;
        transform: scaleX(-1);
        transition: filter 180ms ease;
        background: #000;
      }
      video.blur {
        filter: blur(20px) brightness(0.82) contrast(1.05) saturate(0.72);
      }
      #start {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        padding: 24px;
        background: radial-gradient(
          circle at 50% 35%,
          #15233a 0,
          #05080e 45%,
          #000 100%
        );
      }
      .intro {
        width: min(100%, 360px);
        text-align: center;
        color: #fff;
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 8vw, 42px);
        letter-spacing: -0.045em;
      }
      p {
        margin: 0 0 28px;
        color: #cbd5e1;
        line-height: 1.55;
        font-size: 16px;
      }
      button {
        font: inherit;
        cursor: pointer;
        touch-action: manipulation;
      }
      #startButton {
        width: 100%;
        min-height: 48px;
        border: 0;
        border-radius: 14px;
        background: #22c55e;
        color: #062a15;
        font-weight: 750;
        box-shadow: 0 8px 28px #22c55e42;
        transition:
          transform 180ms ease,
          background 180ms ease;
      }
      #startButton:hover {
        background: #4ade80;
      }
      #startButton:active {
        transform: scale(0.98);
      }
      button:focus-visible {
        outline: 3px solid #fff;
        outline-offset: 3px;
      }
      .hud {
        position: fixed;
        z-index: 5;
        display: flex;
        align-items: center;
        gap: 8px;
        color: #fff;
        background: #020617a8;
        border: 1px solid #ffffff1f;
        backdrop-filter: blur(12px);
        border-radius: 999px;
        padding: 9px 12px;
        font-size: 13px;
        line-height: 1;
        text-shadow: 0 1px 8px #000;
      }
      #status {
        left: max(14px, env(safe-area-inset-left));
        bottom: max(14px, env(safe-area-inset-bottom));
      }
      #indicator {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #fbbf24;
        box-shadow: 0 0 10px #fbbf24;
      }
      #status.active #indicator {
        background: #22c55e;
        box-shadow: 0 0 10px #22c55e;
      }
      #watermark {
        right: max(14px, env(safe-area-inset-right));
        bottom: max(14px, env(safe-area-inset-bottom));
        opacity: 0.78;
      }
      #fullscreenBtn {
        position: fixed;
        top: max(14px, env(safe-area-inset-top));
        right: max(14px, env(safe-area-inset-right));
        z-index: 10;
        width: 48px;
        height: 48px;
        border: 1px solid #ffffff2b;
        border-radius: 50%;
        background: #020617a8;
        color: #fff;
        display: grid;
        place-items: center;
        backdrop-filter: blur(12px);
      }
      #fullscreenBtn svg {
        width: 21px;
        height: 21px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
      }
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <main id="start">
      <section class="intro" aria-labelledby="title">
        <h1 id="title">Foto Kita Blur</h1>
        <p>Show a peace sign with both hands to blur the camera.</p>
        <button id="startButton" type="button">Start camera</button>
      </section>
    </main>
    <button
      id="fullscreenBtn"
      type="button"
      aria-label="Enter fullscreen"
      title="Fullscreen"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M8 3H3v5M16 3h5v5M21 16v5h-5M3 16v5h5" />
      </svg>
    </button>
    <video
      id="video"
      autoplay
      playsinline
      muted
      disablepictureinpicture
    ></video>
    <div id="status" class="hud" role="status" aria-live="polite">
      <span id="indicator"></span><span id="statusText">Ready to start</span>
    </div>
    <div id="watermark" class="hud">hanx.lol</div>
    <audio id="sound" src="blur.mp3" preload="auto"></audio>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>
    <script>
      const video = document.getElementById("video");
      const start = document.getElementById("start");
      const startButton = document.getElementById("startButton");
      const sound = document.getElementById("sound");
      const statusEl = document.getElementById("status");
      const statusText = document.getElementById("statusText");
      const fullscreenBtn = document.getElementById("fullscreenBtn");
      let running = false,
        isBlurred = false,
        stableFrames = 0,
        lastDetection = 0,
        activationPlayed = false;
      const DETECTION_INTERVAL = 66;
      const ACTIVATE_AFTER = 3;
      const RELEASE_AFTER = 5;

      function setStatus(text, active = false) {
        statusText.textContent = text;
        statusEl.classList.toggle("active", active);
      }
      function dist(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }
      function extended(lm, tip, pip, mcp) {
        return (
          dist(lm[tip], lm[mcp]) > dist(lm[pip], lm[mcp]) * 1.38 &&
          lm[tip].y < lm[pip].y
        );
      }
      function curled(lm, tip, pip, mcp) {
        return (
          dist(lm[tip], lm[mcp]) < dist(lm[pip], lm[mcp]) * 1.12 &&
          lm[tip].y > lm[pip].y - 0.02
        );
      }
      function isPeace(lm) {
        const handSize = dist(lm[0], lm[9]);
        if (handSize < 0.055) return false; // Ignore tiny, distant hands that produce unstable landmarks.
        const indexUp = extended(lm, 8, 6, 5);
        const middleUp = extended(lm, 12, 10, 9);
        const ringCurled = curled(lm, 16, 14, 13);
        const pinkyCurled = curled(lm, 20, 18, 17);
        const fingersApart = dist(lm[8], lm[12]) > handSize * 0.42;
        return indexUp && middleUp && ringCurled && pinkyCurled && fingersApart;
      }
      function setBlur(blur) {
        if (blur === isBlurred) return;
        isBlurred = blur;
        video.classList.toggle("blur", blur);
        if (blur) {
          setStatus("Privacy blur active", true);
          if (!activationPlayed) {
            activationPlayed = true;
            sound.currentTime = 0;
            sound.play().catch(() => {});
          }
        } else {
          setStatus("Show both peace signs", false);
          activationPlayed = false;
        }
      }
      const hands = new Hands({
        locateFile: (file) =>
          `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`,
      });
      hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.65,
      });
      hands.onResults((results) => {
        const found = results.multiHandLandmarks || [];
        const peace = found.reduce(
          (count, hand) => count + Number(isPeace(hand)),
          0,
        );
        const shouldBlur = found.length === 2 && peace === 2;
        stableFrames = shouldBlur
          ? Math.min(stableFrames + 1, ACTIVATE_AFTER)
          : Math.max(stableFrames - 1, -RELEASE_AFTER);
        if (!isBlurred && stableFrames >= ACTIVATE_AFTER) setBlur(true);
        if (isBlurred && stableFrames <= -RELEASE_AFTER) setBlur(false);
        if (!isBlurred)
          setStatus(
            found.length
              ? `Hands ${found.length}/2 · Peace signs ${peace}/2`
              : "Show both peace signs",
          );
      });
      fullscreenBtn.addEventListener("click", async () => {
        try {
          document.fullscreenElement
            ? await document.exitFullscreen()
            : await document.documentElement.requestFullscreen();
        } catch {
          setStatus("Fullscreen is unavailable");
        }
      });
      document.addEventListener("fullscreenchange", () => {
        const active = Boolean(document.fullscreenElement);
        fullscreenBtn.setAttribute(
          "aria-label",
          active ? "Exit fullscreen" : "Enter fullscreen",
        );
      });
      async function startCamera() {
        startButton.disabled = true;
        startButton.textContent = "Starting camera…";
        setStatus("Requesting camera access");
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "user" },
            width: { ideal: 1280 },
            height: { ideal: 720 },
            frameRate: { ideal: 30, max: 30 },
          },
          audio: false,
        });
        video.srcObject = stream;
        await new Promise((resolve) => (video.onloadedmetadata = resolve));
        await video.play();
        stream.getVideoTracks()[0].addEventListener("ended", () => {
          running = false;
          setBlur(false);
          setStatus("Camera stopped");
        });
        start.remove();
        running = true;
        setStatus("Show both peace signs");
        detectLoop();
      }
      async function detectLoop(now = 0) {
        if (!running) return;
        if (
          video.readyState >= HTMLMediaElement.HAVE_CURRENT_DATA &&
          now - lastDetection >= DETECTION_INTERVAL
        ) {
          lastDetection = now;
          try {
            await hands.send({ image: video });
          } catch (error) {
            console.error(error);
            setStatus("Hand detector paused — retry camera");
          }
        }
        requestAnimationFrame(detectLoop);
      }
      startButton.addEventListener("click", () =>
        startCamera().catch((error) => {
          console.error(error);
          startButton.disabled = false;
          startButton.textContent = "Retry camera";
          setStatus(
            error.name === "NotAllowedError"
              ? "Camera permission was denied"
              : "Unable to start the camera",
          );
        }),
      );
    </script>
  </body>
</html>
