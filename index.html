<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <title>foto kita blur</title>

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: Arial, sans-serif;
      }

      video {
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        transform: scaleX(-1);
        transition: filter 0.18s ease;
        background: #000;
      }

      video.blur {
        filter: blur(18px) brightness(0.82) saturate(0.85);
      }

      #start {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        background: #000;
        color: #fff;
        font-size: 18px;
        user-select: none;
      }

      #watermark {
        position: fixed;
        right: 14px;
        bottom: 12px;
        z-index: 5;
        color: white;
        opacity: 0.55;
        font-size: 12px;
        text-shadow: 0 1px 8px #000;
      }

      #status {
        position: fixed;
        left: 14px;
        bottom: 12px;
        z-index: 5;
        color: white;
        opacity: 0.65;
        font-size: 12px;
        text-shadow: 0 1px 8px #000;
      }
      #fullscreenBtn {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 10;

        width: 42px;
        height: 42px;

        border-radius: 999px;
        background: rgba(0, 0, 0, 0.4);

        color: white;
        display: flex;
        align-items: center;
        justify-content: center;

        backdrop-filter: blur(10px);
      }
    </style>
  </head>

  <body>
    <div id="start">tap to start</div>
    <div id="fullscreenBtn">⛶</div>
    <video
      id="video"
      autoplay
      playsinline
      muted
      disablepictureinpicture
    ></video>
    <div id="watermark">hanx.lol</div>
    <div id="status">loading...</div>

    <audio id="sound" src="blur.mp3" preload="auto"></audio>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>

    <script>
      const video = document.getElementById("video");
      const start = document.getElementById("start");
      const sound = document.getElementById("sound");
      const statusEl = document.getElementById("status");

      let audioPlayed = false;
      let running = false;
      let isBlurred = false;

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function dist(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function fingerUp(lm, tip, pip) {
        return lm[tip].y < lm[pip].y;
      }

      function fingerDown(lm, tip, pip) {
        return lm[tip].y > lm[pip].y;
      }

      function isPeace(lm) {
        const indexUp = fingerUp(lm, 8, 6);
        const middleUp = fingerUp(lm, 12, 10);

        const ringDown = fingerDown(lm, 16, 14);
        const pinkyDown = fingerDown(lm, 20, 18);

        const spread = dist(lm[8], lm[12]) > dist(lm[5], lm[9]) * 0.35;

        return indexUp && middleUp && ringDown && pinkyDown && spread;
      }

      sound.onended = () => {
        audioPlayed = false;
      };

      document.getElementById("fullscreenBtn").onclick = async () => {
        try {
          if (!document.fullscreenElement) {
            await document.documentElement.requestFullscreen();
          } else {
            await document.exitFullscreen();
          }
        } catch {}
      };

      start.onclick = async () => {
        try {
          await startCamera();
        } catch (e) {
          alert(e.message);
          console.error(e);
          setStatus("camera error");
        }
      };
    </script>
  </body>
</html>
