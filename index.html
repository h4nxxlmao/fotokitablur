<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <title>foto kita blur</title>

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: Arial, sans-serif;
      }

      video {
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        transform: scaleX(-1);
        transition: filter 0.18s ease;
        background: #000;
      }

      video.blur {
        filter: blur(20px) brightness(0.85) contrast(1.05) saturate(0.75);
      }

      #start {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        background: #000;
        color: #fff;
        font-size: 18px;
        user-select: none;
      }

      #watermark {
        position: fixed;
        right: 14px;
        bottom: 12px;
        z-index: 5;
        color: white;
        opacity: 0.55;
        font-size: 12px;
        text-shadow: 0 1px 8px #000;
      }

      #status {
        position: fixed;
        left: 14px;
        bottom: 12px;
        z-index: 5;
        color: white;
        opacity: 0.65;
        font-size: 12px;
        text-shadow: 0 1px 8px #000;
      }

      #fullscreenBtn {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 10;
        width: 42px;
        height: 42px;
        border: 0;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.4);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font: inherit;
        font-size: 22px;
        cursor: pointer;
        backdrop-filter: blur(10px);
      }
    </style>
  </head>

  <body>
    <div id="start">tap to start</div>
    <button id="fullscreenBtn" type="button" aria-label="Toggle fullscreen">
      ⛶
    </button>
    <video
      id="video"
      autoplay
      playsinline
      muted
      disablepictureinpicture
    ></video>
    <div id="watermark">hanx.lol</div>
    <div id="status">loading...</div>

    <audio id="sound" src="blur.mp3" preload="auto"></audio>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>

    <script>
      const video = document.getElementById("video");
      const start = document.getElementById("start");
      const sound = document.getElementById("sound");
      const statusEl = document.getElementById("status");

      let audioPlayed = false;
      let running = false;
      let isBlurred = false;
      let detecting = false;

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function dist(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      // This is based on joint geometry, not screen direction. It works when a
      // hand is upright, rotated, upside down, or mirrored by the front camera.
      function angle(a, b, c) {
        const abx = a.x - b.x;
        const aby = a.y - b.y;
        const abz = a.z - b.z;
        const cbx = c.x - b.x;
        const cby = c.y - b.y;
        const cbz = c.z - b.z;
        const denominator =
          Math.hypot(abx, aby, abz) * Math.hypot(cbx, cby, cbz);
        if (!denominator) return 0;
        const cosine = (abx * cbx + aby * cby + abz * cbz) / denominator;
        return (Math.acos(Math.max(-1, Math.min(1, cosine))) * 180) / Math.PI;
      }

      function fingerExtended(lm, mcp, pip, dip, tip) {
        return (
          angle(lm[mcp], lm[pip], lm[dip]) > 155 &&
          angle(lm[pip], lm[dip], lm[tip]) > 145 &&
          dist(lm[tip], lm[0]) > dist(lm[pip], lm[0]) * 1.15
        );
      }

      function fingerCurled(lm, mcp, pip, dip, tip) {
        const pipBent = angle(lm[mcp], lm[pip], lm[dip]) < 135;
        const tipNearBase =
          dist(lm[tip], lm[mcp]) < dist(lm[pip], lm[mcp]) * 1.35;
        return pipBent || tipNearBase;
      }

      function isPeace(lm) {
        const indexExtended = fingerExtended(lm, 5, 6, 7, 8);
        const middleExtended = fingerExtended(lm, 9, 10, 11, 12);
        const ringCurled = fingerCurled(lm, 13, 14, 15, 16);
        const pinkyCurled = fingerCurled(lm, 17, 18, 19, 20);
        const palmWidth = dist(lm[5], lm[17]);
        const fingersApart = dist(lm[8], lm[12]) > palmWidth * 0.32;

        return (
          indexExtended &&
          middleExtended &&
          ringCurled &&
          pinkyCurled &&
          fingersApart
        );
      }

      sound.onended = () => {
        // A later peace-sign detection may start the sound from the beginning.
        audioPlayed = false;
      };

      document.getElementById("fullscreenBtn").onclick = async () => {
        try {
          if (!document.fullscreenElement) {
            await document.documentElement.requestFullscreen();
          } else {
            await document.exitFullscreen();
          }
        } catch (e) {
          console.error(e);
        }
      };

      const hands = new Hands({
        locateFile: (file) =>
          `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`,
      });

      hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6,
      });

      hands.onResults((results) => {
        const found = results.multiHandLandmarks || [];
        let peace = 0;

        for (const hand of found) {
          if (isPeace(hand)) peace++;
        }

        const shouldBlur = found.length >= 2 && peace >= 2;
        setStatus(`hands:${found.length} peace:${peace}`);

        // Apply and remove blur directly from the latest completed detection.
        video.classList.toggle("blur", shouldBlur);
        isBlurred = shouldBlur;

        // Never interrupt playback. The onended handler unlocks the next start.
        if (shouldBlur && !audioPlayed) {
          audioPlayed = true;
          sound.currentTime = 0;
          sound.play().catch(() => {});
        }
      });

      async function startCamera() {
        setStatus("starting camera...");

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "user" },
            width: { ideal: 4096 },
            height: { ideal: 2160 },
            frameRate: { ideal: 60, max: 60 },
          },
          audio: false,
        });

        const track = stream.getVideoTracks()[0];
        console.log("camera settings:", track.getSettings());

        video.srcObject = stream;

        await new Promise((resolve) => {
          video.onloadedmetadata = resolve;
        });

        await video.play();
        start.remove();
        setStatus("ready");
        running = true;
        detectLoop();
      }

      async function detectLoop() {
        if (!running) return;

        // Do not queue inference jobs: start a new one as soon as the prior frame finishes.
        if (video.readyState >= 2 && !detecting) {
          detecting = true;
          try {
            await hands.send({ image: video });
          } catch (e) {
            console.error(e);
            setStatus("hand model error");
          } finally {
            detecting = false;
          }
        }

        requestAnimationFrame(detectLoop);
      }

      start.onclick = async () => {
        try {
          await startCamera();
        } catch (e) {
          alert(e.message);
          console.error(e);
          setStatus("camera error");
        }
      };
    </script>
  </body>
</html>
