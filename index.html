<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      video {
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        transform: scaleX(-1);
      }

      #start {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: black;
        color: white;
        font-family: Arial;
        z-index: 99;
      }

      #watermark {
        position: fixed;
        right: 12px;
        bottom: 12px;
        color: white;
        opacity: 0.5;
        font-family: Arial;
      }
    </style>
  </head>
  <body>
    <div id="start">Tap To Start</div>

    <video id="video" autoplay playsinline muted></video>

    <div id="watermark">hanx.lol</div>

    <script>
      const start = document.getElementById("start");
      const video = document.getElementById("video");

      start.onclick = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: "user",
            },
            audio: false,
          });

          video.srcObject = stream;

          await video.play();

          start.remove();

          console.log("camera ok");
        } catch (err) {
          alert(err.message);
          console.error(err);
        }
      };
    </script>
  </body>
</html>
